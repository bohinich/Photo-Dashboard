<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/Photo-Dashboard/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Dashboard</title>
  <script type="module" crossorigin src="/Photo-Dashboard/index.js"></script>
  <link rel="modulepreload" crossorigin href="/Photo-Dashboard/assets/vendor-B5nsgUv9.js">
  <link rel="stylesheet" crossorigin href="/Photo-Dashboard/assets/vendor-DumFYO8Z.css">
  <link rel="stylesheet" crossorigin href="/Photo-Dashboard/assets/index-CqjVOgwK.css">
</head>

<body>
  <header>
    <div class="header-top">
      <div class="logo">PhotoDash</div>
      <nav>
        <button class="nav-btn" data-view="home">Home</button>
        <button class="nav-btn" data-view="gallery">Gallery</button>
        <button class="nav-btn" data-view="favorites">Favorites</button>
      </nav>
    </div>

    <div class="header-content">
      <h1 class="page-title">STANDARD GALLERY</h1>

      <div class="filters">
        <button class="filter-btn" data-filter="all">ALL</button>
        <button class="filter-btn" data-filter="approved">APPROVED</button>
        <button class="filter-btn" data-filter="rejected">REJECTED</button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1 class="hero-title">Find Perfect Photos</h1>
        <p class="hero-subtitle">Search high-quality images instantly</p>

        <form class="search-form">
          <input type="text" name="query" placeholder="Search images..."/>
          <button type="submit">Search</button>
        </form>
      </div>
    </section>

    <section class="results">
      <div class="container">
        <ul class="gallery" id="gallery"></ul>

        <button class="load-more hidden">Load More</button>

        <div class="loader hidden"></div>
      </div>
    </section>
  </main>

</body>

</html>
